services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    ports:
      - "${OAUTH_PORT:-3000}:3000"
    volumes:
      - bot-data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  bot-data:
  redis-data:
